version: "3.9"

services:
  db:
    image: postgres:16
    container_name: assetflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: assetflow
      POSTGRES_PASSWORD: assetflow_dev
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assetflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: assetflow_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://assetflow:assetflow_dev@db:5432/assetflow
      JWT_SECRET: change_this_in_prod_but_not_today
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
